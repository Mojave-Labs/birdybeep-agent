name: Release

# The industry-standard Changesets "Version PR" flow.
#
# On every push to main this runs `changesets/action`:
#   • If unreleased changesets exist, it opens/updates a "Version Packages" PR
#     that bumps the fixed group (see .changeset/config.json) and writes changelogs.
#     Merging THAT PR is the deliberate release switch — ordinary commits publish nothing.
#   • When the Version PR is merged (no changesets left on main), it runs
#     `pnpm release:ci` → build + packaging guard (check-pack) + `changeset publish`,
#     which uploads the fixed group to npm in dependency order and pushes git tags.
#
# Auth is dual-mode (see docs/release.md "npm auth"):
#   • Bootstrap: a short-lived granular NPM_TOKEN secret for the FIRST publish only
#     (npm caps token life at 90 days — irrelevant for one use; revoke right after).
#   • Steady state: npm TRUSTED PUBLISHING (OIDC) — configure this repo + this workflow
#     file as the trusted publisher on each package at npmjs.com, then DELETE the
#     NPM_TOKEN secret. No token exists to expire or leak; publishes authenticate via
#     the id-token permission below. REQUIRES npm >= 11.5.1 — the runner's Node 22 ships
#     npm 10.x, which silently skips the OIDC exchange and dies with a misleading
#     `ENEEDAUTH`, so we upgrade npm before publishing (see the step below).
# HUMAN-REQUIRED before the first publish (A-HUMAN-NPM):
#   • Create the @birdybeep npm org; bootstrap token as above.
#   • Make the repo public (provenance requires a public repo at publish time).

on:
  push:
    branches: [main]

# Only one release run at a time so the Version PR / publish never race.
concurrency: release-${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # push the Version PR branch + release tags
  pull-requests: write # open/update the "Version Packages" PR
  id-token: write # npm provenance (supply-chain attestation)

defaults:
  run:
    shell: bash

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Changesets needs full history to diff versions / write changelogs.
          fetch-depth: 0

      - uses: ./.github/actions/setup

      # npm's OIDC trusted publishing needs npm >= 11.5.1; the runner's Node 22 bundles
      # npm 10.x, which never attempts the OIDC handshake and fails publish with a
      # misleading ENEEDAUTH. Pin the current 11.x line (avoid betting a release on a
      # brand-new npm major). pnpm publish shells out to this npm, so the version here
      # is what matters.
      - name: Upgrade npm to an OIDC-capable version (>= 11.5.1)
        run: |
          npm install -g npm@^11.5.1
          echo "npm now: $(npm --version)"

      # Write ~/.npmrc ourselves so the changesets action doesn't generate one that
      # references ${NPM_TOKEN}: with the secret deleted (tokenless OIDC mode) that
      # reference makes npm die with "Failed to replace env in config". With a token
      # present we reproduce the action's default; without one, registry-only — the
      # OIDC exchange needs no auth line.
      - name: Configure npm auth (token bootstrap, or tokenless via OIDC)
        run: |
          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "using NPM_TOKEN (bootstrap mode)"
            printf '//registry.npmjs.org/:_authToken=%s\n' "\${NPM_TOKEN}" > "$HOME/.npmrc"
          else
            echo "no NPM_TOKEN secret — relying on npm trusted publishing (OIDC)"
            printf 'registry=https://registry.npmjs.org/\n' > "$HOME/.npmrc"
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # SHA-pinned, not tag-pinned: this action receives NPM_TOKEN and the OIDC
      # id-token, so a retargeted `v1` tag upstream would execute attacker code with
      # publish credentials in scope on our next release, invisibly to review. Bump
      # via Dependabot (.github/dependabot.yml), which rewrites the SHA + comment
      # together. Enforced by packages/test-harness/src/workflow-pinning.test.ts.
      - name: Create Version PR or publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          # Default `version` command (`changeset version`) applies the fixed-group
          # bump + changelogs for the Version PR. `publish` runs only once that PR
          # is merged and no changesets remain.
          publish: pnpm release:ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Generate npm provenance for a public, auditable supply chain.
          NPM_CONFIG_PROVENANCE: "true"
