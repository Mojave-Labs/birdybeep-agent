name: CI

on:
  push:
    branches: [main]
  pull_request:

# Newer pushes to the same ref cancel in-flight runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Force bash on every run-step so the same commands work on the Windows runner
# (whose default shell is pwsh) as on macOS/Linux.
defaults:
  run:
    shell: bash

jobs:
  # One job per OS — the CLI installs into and edits config on all three, so the
  # full gate (lint + typecheck + unit/snapshot tests + build + format) must be
  # green everywhere. The adapter E2E suite (A-TEST-HARNESS) and config-snapshot
  # tests plug into `pnpm test` as they land; this matrix already runs them.
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the other OSes when one fails — we want to see which OS broke.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm format:check
      # birdybeep-agent-fuf: prove the codex notify send survives `codex exec` reaping its
      # process group. Needs only the built CLI + POSIX process groups (no codex binary / API
      # key), so it runs as an always-on gate on the POSIX runners. The race is a POSIX
      # process-group SIGKILL, so it does not apply on Windows (the script skips there anyway).
      # The script exits 2 to SKIP when a precondition is unmet (unreachable in this lane — it is
      # POSIX-gated and always runs after `pnpm build`); tolerate 2 so a skip can never red the
      # step, while a real assertion failure (exit 1) still fails the job.
      - name: codex notify exec-exit reap (live-e2e, POSIX)
        if: runner.os != 'Windows'
        run: node scripts/live-e2e-codex-reap.mjs || [ "$?" -eq 2 ]

  # A PR that changes a publishable package must carry a changeset, so versions
  # never drift out of someone's head. Runs on PRs only (on main the changesets
  # have already been consumed by the merged Version PR). `changeset status`
  # exits non-zero when changed packages have no associated changeset.
  # The bot's "Version Packages" PR (changeset-release/*) is exempt: it is the one
  # PR whose job is to CONSUME the changesets while bumping packages, so this gate
  # would fail on it by construction.
  changeset:
    name: changeset status
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'changeset-release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Ensure the base branch is available for the diff
        run: git fetch origin "$GITHUB_BASE_REF"
      - run: pnpm changeset status --since="origin/$GITHUB_BASE_REF"
